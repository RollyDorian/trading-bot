name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cryptobot_test
          POSTGRES_USER: cryptobot
          POSTGRES_PASSWORD: cryptobot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cryptobot -d cryptobot_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    env:
      BOT_MODE: collect
      DATABASE_ROLE: research
      DATABASE_URL: postgresql+asyncpg://cryptobot:cryptobot@localhost:5432/cryptobot_research
      TEST_DATABASE_ROLE: test
      TEST_DATABASE_URL: postgresql+asyncpg://cryptobot:cryptobot@localhost:5432/cryptobot_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: alembic -x database-role=test upgrade head
      - run: pytest
      - run: ruff check .
      - run: mypy src migrations
      - run: alembic upgrade head --sql

  image:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/rollydorian/trading-bot:sha-${{ github.sha }}
