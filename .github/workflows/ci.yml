name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cryptobot
          POSTGRES_USER: cryptobot
          POSTGRES_PASSWORD: cryptobot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cryptobot -d cryptobot"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql+asyncpg://cryptobot:cryptobot@localhost:5432/cryptobot

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest
      - run: ruff check .
      - run: mypy src migrations
      - run: alembic upgrade head --sql
