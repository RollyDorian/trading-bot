services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptobot}
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: cryptobot
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot -d ${POSTGRES_DB:-cryptobot}"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  dashboard:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://cryptobot:cryptobot@postgres:5432/cryptobot
      DATASETS_DIR: /app/datasets
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./datasets:/app/datasets:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
