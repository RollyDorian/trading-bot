<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<title>Hibachi COLLECT Dashboard</title><style>
body{font:14px system-ui;max-width:1100px;margin:2rem auto;padding:0 1rem;color:#ddd;background:#15181d}h1{font-size:20px}section{border:1px solid #39404a;padding:1rem;margin:1rem 0}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:.5rem;border-bottom:1px solid #333}.event{display:flex;gap:.7rem;padding:.5rem 0;border-bottom:1px solid #333}button{margin-left:auto}dialog{max-width:720px;width:90%;background:#20252c;color:#eee;border:1px solid #555}pre{white-space:pre-wrap}.valid{color:#55c98b}.warning{color:#e6ac50}.rejected{color:#e66}.not_validated{color:#aaa}
</style></head><body><h1>HIBACHI RESEARCH — COLLECT ONLY</h1>
<section><h2>Recent system events</h2><div id="events">Loading…</div></section>
<section><h2>Versioned datasets</h2><table><thead><tr><th>Version</th><th>Rows</th><th>Quality</th><th>Reason</th></tr></thead><tbody id="datasets"></tbody></table></section>
<dialog id="detail"><button id="close">Close</button><h2>System event detail</h2><pre id="detailText"></pre></dialog>
<script>'use strict';const get=async u=>{const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw Error(r.status);return r.json()};const esc=s=>String(s??'');async function detail(id){const e=await get(`/api/system/${id}`);document.querySelector('#detailText').textContent=JSON.stringify(e,null,2);document.querySelector('#detail').showModal()}async function load(){const [events,datasets]=await Promise.all([get('/api/system/recent'),get('/api/datasets')]);const er=document.querySelector('#events');er.replaceChildren();for(const e of events){const row=document.createElement('div');row.className='event';const text=document.createElement('span');text.textContent=`${e.severity} — ${e.event_type} — ${e.message}`;const button=document.createElement('button');button.textContent='Detail';button.onclick=()=>detail(e.id);row.append(text,button);er.append(row)}const body=document.querySelector('#datasets');body.replaceChildren();for(const d of datasets){const m=d.manifest||{},row=body.insertRow();[m.dataset_id??m.version??'—',m.row_counts?.events??m.row_count??'—',d.quality_status==='not_validated'?'Not validated':d.quality_status,d.quality_reason].forEach((v,i)=>{const cell=row.insertCell();cell.textContent=esc(v);if(i===2)cell.className=d.quality_status})}}document.querySelector('#close').onclick=()=>document.querySelector('#detail').close();load();</script></body></html>
