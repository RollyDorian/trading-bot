x-runtime-environment: &runtime-environment
  BOT_MODE: collect
  DATABASE_ROLE: research
  DATABASE_URL: ${DATABASE_URL:?set the research PostgreSQL URL outside Git}

x-runtime-security: &runtime-security
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: postgres:16-alpine
    command: >-
      postgres -c shared_buffers=64MB -c work_mem=4MB
      -c maintenance_work_mem=32MB -c max_connections=5
      -c log_min_duration_statement=1000
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptobot}
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set the PostgreSQL password outside Git}
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot -d ${POSTGRES_DB:-cryptobot}"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    image: ${IMAGE_REPOSITORY:?set the GHCR repository}@${IMAGE_DIGEST:?set an immutable sha256 digest}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      BOT_MODE: collect
      DATABASE_ROLE: research
      DATABASE_URL: ${MIGRATION_DATABASE_URL:?set the migration PostgreSQL URL outside Git}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]
    restart: "no"
    <<: *runtime-security

  collector:
    image: ${IMAGE_REPOSITORY:?set the GHCR repository}@${IMAGE_DIGEST:?set an immutable sha256 digest}
    command: ["hibachi-bot", "--stream"]
    mem_limit: 160m
    environment: *runtime-environment
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: "on-failure:5"
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-m", "trading_bot.healthcheck", "--max-age-seconds", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    <<: *runtime-security

  dashboard:
    image: ${IMAGE_REPOSITORY:?set the GHCR repository}@${IMAGE_DIGEST:?set an immutable sha256 digest}
    command: ["uvicorn", "trading_bot.dashboard.app:app", "--host", "0.0.0.0", "--port", "8000"]
    mem_limit: 80m
    environment:
      <<: *runtime-environment
      DATASETS_DIR: /app/datasets
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:?set outside Git}
      ADMISSION_REPORT_PATH: /app/reports/paper-admission-report.json
    volumes:
      - ${DATASETS_PATH:?set an app-owned dataset directory}:/app/datasets
      - ${REPORTS_PATH:?set an app-owned report directory}:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dashboard"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/status', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *runtime-security

volumes:
  postgres-data:
